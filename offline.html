<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07111f">
    <title>オフライン | CelestiFrame</title>
    <style>
      @font-face { font-family: "IBM Plex Sans JP"; src: url("./assets/fonts/IBMPlexSansJP-Regular.woff2") format("woff2"); font-display: swap; }
      @font-face { font-family: "IBM Plex Sans Condensed"; src: url("./assets/fonts/IBMPlexSansCondensed-SemiBold.woff2") format("woff2"); font-display: swap; }
      :root { color-scheme: dark; font-family: "IBM Plex Sans JP", "Yu Gothic UI", system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { min-height: 100dvh; margin: 0; display: grid; place-items: center; padding: max(28px, env(safe-area-inset-top)) 24px max(28px, env(safe-area-inset-bottom)); background: #07111f; color: #f3f7fc; }
      main { width: min(420px, 100%); padding-top: 22px; border-top: 2px solid #62d5c7; }
      .status { display: flex; align-items: center; gap: 8px; color: #ffb44a; font-size: 12px; font-weight: 700; }
      .status::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
      h1 { margin: 18px 0 10px; font: 600 30px/1.15 "IBM Plex Sans Condensed", sans-serif; }
      p { margin: 0; color: #93a4b8; line-height: 1.8; }
      small { display: block; margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(193, 216, 241, .16); color: #93a4b8; line-height: 1.65; }
      button { width: 100%; min-height: 48px; margin-top: 24px; border: 1px solid #62d5c7; border-radius: 8px; background: #62d5c7; color: #07111f; font: inherit; font-weight: 700; cursor: pointer; }
      button:focus-visible { outline: 2px solid #dceaff; outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <div class="status">通信なし</div>
      <h1>撮影計画は端末に残っています</h1>
      <p>通信が戻ったら、もう一度読み込んでください。</p>
      <small>保存済みの地点・日時・撮影計画は削除されません。地図や予報の更新には通信が必要です。</small>
      <button type="button" onclick="location.reload()">もう一度読み込む</button>
    </main>
    <script>window.addEventListener("online", () => location.reload());</script>
  </body>
</html>
